<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ripfullpage Editor</title>
    <link rel="stylesheet" href="editor.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="toolbar">
        <div class="brand">
          <img src="../icons/icon48.png" alt="" class="brand-icon">
          <div>
            <h1>ripfullpage</h1>
            <p id="imageMeta">正在载入截图...</p>
          </div>
        </div>

        <div class="toolbar-actions" aria-label="文件操作">
          <button id="undoButton" class="button" type="button">撤销</button>
          <button id="redoButton" class="button" type="button">重做</button>
          <button id="applyCropButton" class="button primary" type="button">确认裁剪</button>
          <button id="resetButton" class="button" type="button">重置</button>
          <button id="copyButton" class="button" type="button">复制</button>
          <button id="watermarkButton" class="button" type="button">水印</button>
          <button id="shareButton" class="button" type="button">分享</button>
          <label class="toolbar-select-label">
            <span>格式</span>
            <select id="formatSelect">
              <option value="image/png">PNG</option>
              <option value="image/jpeg">JPG</option>
              <option value="image/webp">WebP</option>
            </select>
          </label>
          <label class="toolbar-range-label">
            <span>质量</span>
            <input id="qualityInput" type="range" min="50" max="100" value="92">
          </label>
          <button id="downloadButton" class="button" type="button">下载图片</button>
          <button id="downloadPdfButton" class="button" type="button">导出 PDF</button>
        </div>
      </header>

      <div class="editor-layout">
        <aside class="side-tools" aria-label="编辑工具">
          <div class="tool-group" role="group" aria-label="编辑工具">
            <button class="tool-button active" data-tool="crop" type="button" title="裁剪">裁剪</button>
            <button class="tool-button" data-tool="pen" type="button" title="画笔">画笔</button>
            <button class="tool-button" data-tool="marker" type="button" title="高亮">高亮</button>
            <button class="tool-button" data-tool="rect" type="button" title="矩形">矩形</button>
            <button class="tool-button" data-tool="ellipse" type="button" title="椭圆">椭圆</button>
            <button class="tool-button" data-tool="arrow" type="button" title="箭头">箭头</button>
            <button class="tool-button" data-tool="text" type="button" title="文字">文字</button>
            <button class="tool-button" data-tool="mosaic" type="button" title="马赛克">马赛克</button>
            <button class="tool-button blur-tool" data-tool="blur" type="button" title="模糊">模糊</button>
            <button class="tool-button" data-tool="sticker" type="button" title="贴图">贴图</button>
          </div>

          <div class="tool-controls">
            <div id="privacyControls" class="privacy-controls" hidden>
              <div class="privacy-control-header">
                <label id="privacyStrengthLabel" class="field-label" for="privacyStrengthInput">强度</label>
                <span id="privacyStrengthValue">5</span>
              </div>
              <label class="range-label" title="打码强度">
                <input id="privacyStrengthInput" type="range" min="1" max="10" value="5">
              </label>
            </div>

            <label class="field-label" for="colorInput">颜色</label>
            <label class="control-label" title="颜色">
              <input id="colorInput" type="color" value="#ef4444">
            </label>

            <label class="field-label" for="sizeInput">粗细</label>
            <label class="range-label" title="粗细">
              <input id="sizeInput" type="range" min="2" max="48" value="6">
            </label>

            <label class="field-label" for="fontSizeInput">字号</label>
            <label class="range-label" title="字号">
              <input id="fontSizeInput" type="range" min="12" max="96" value="28">
            </label>
          </div>
        </aside>

        <section class="workspace" aria-label="截图预览">
          <div id="dimensionBadge" class="dimension-badge">0 x 0px</div>
          <div id="stage" class="stage">
            <div id="imageWrap" class="image-wrap">
              <img id="previewImage" alt="截图预览">
              <canvas id="editCanvas" aria-label="编辑图层"></canvas>
              <div id="cropBox" class="crop-box" hidden>
                <span class="handle handle-n" data-handle="n"></span>
                <span class="handle handle-ne" data-handle="ne"></span>
                <span class="handle handle-e" data-handle="e"></span>
                <span class="handle handle-se" data-handle="se"></span>
                <span class="handle handle-s" data-handle="s"></span>
                <span class="handle handle-sw" data-handle="sw"></span>
                <span class="handle handle-w" data-handle="w"></span>
                <span class="handle handle-nw" data-handle="nw"></span>
                <span id="cropSize" class="crop-size"></span>
              </div>
            </div>
          </div>
        </section>
      </div>

      <div id="watermarkPanel" class="watermark-panel" hidden>
        <label class="watermark-field" for="watermarkTextInput">
          <span>水印文字</span>
          <input id="watermarkTextInput" type="text" placeholder="输入水印文字">
        </label>

        <div class="watermark-field">
          <span>位置</span>
          <div class="watermark-position-grid" role="group" aria-label="水印位置">
            <button class="watermark-position-button" data-watermark-position="top-left" type="button" title="左上">↖</button>
            <button class="watermark-position-button" data-watermark-position="top-right" type="button" title="右上">↗</button>
            <button class="watermark-position-button active" data-watermark-position="bottom-right" type="button" title="右下">↘</button>
            <button class="watermark-position-button" data-watermark-position="bottom-left" type="button" title="左下">↙</button>
            <button class="watermark-position-button" data-watermark-position="center" type="button" title="居中">⊙</button>
          </div>
        </div>

        <label class="watermark-field" for="watermarkFontSizeInput">
          <span>字号</span>
          <input id="watermarkFontSizeInput" type="range" min="12" max="36" value="22">
        </label>

        <label class="watermark-field" for="watermarkOpacityInput">
          <span>透明度</span>
          <input id="watermarkOpacityInput" type="range" min="10" max="100" value="72">
        </label>

        <div class="watermark-field">
          <span>颜色</span>
          <div class="watermark-color-row" role="group" aria-label="水印颜色">
            <button class="watermark-color-button active" data-watermark-color="#ffffff" type="button" title="白色"></button>
            <button class="watermark-color-button" data-watermark-color="#000000" type="button" title="黑色"></button>
            <button class="watermark-color-button" data-watermark-color="#94a3b8" type="button" title="灰色"></button>
            <button class="watermark-color-button" data-watermark-color="#ef4444" type="button" title="红色"></button>
          </div>
        </div>

        <div class="watermark-actions">
          <button id="applyWatermarkButton" class="button primary" type="button">应用水印</button>
          <button id="cancelWatermarkButton" class="button" type="button">取消</button>
        </div>
      </div>
      <input id="stickerInput" type="file" accept="image/*" hidden>
    </main>

    <script src="editor.js"></script>
  </body>
</html>
